name: CI

on: [push, pull_request]

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate yai-law pin format
        run: |
          test -f deps/yai-law.ref
          grep -E '^law_sha=[0-9a-f]{40}$' deps/yai-law.ref

  build:
    needs: integrity-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Test
        run: make test
